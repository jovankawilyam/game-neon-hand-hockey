<!DOCTYPE html>
<html lang="id">
<head>
    <h1>Build by Jovanka</h1>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hand Hockey by Jovanka - FULL SCREEN ARENA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        h1 { 
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%); color: #00ff88; font-family: 'Courier New', monospace; z-index: 1000; pointer-events: none; 
            text-shadow: 0 0 20px #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
            color: #00ff88;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #webcamCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.9;
            mix-blend-mode: screen;
            filter: contrast(1.2) brightness(1.1);
            z-index: 5;
            /* FIX 1: Mirroring Kamera secara visual */
            transform: scaleX(-1);
        }
        
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            cursor: none;
        }
        
        .hud {
            position: fixed;
            top: 20px;
            font-size: 2.5vw;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
            z-index: 100;
            pointer-events: none;
        }
        #scoreLeft { left: 5vw; color: #00ff88; }
        #scoreRight { right: 5vw; color: #ff00ff; }
        #handsInfo { 
            top: 8vh; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #ffff00; 
            font-size: 1.8vw;
        }
        
        .control {
            position: fixed;
            background: linear-gradient(45deg, #00ff88, #ff00ff);
            border: none;
            padding: 15px 35px;
            font-size: 1.4em;
            font-weight: bold;
            color: #000;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(0,255,136,0.8);
            z-index: 1000;
            transition: all 0.3s;
        }
        .control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255,0,255,1);
        }
        #startGame { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        /* FIX 2: Posisi tombol reset agar tidak menghalangi skor */
        #resetGame { bottom: 20px; right: 20px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <video id="webcamCanvas" autoplay playsinline muted></video>
        <div id="scoreLeft" class="hud">P1: 0</div>
        <div id="scoreRight" class="hud">P2: 0</div>
        <div id="handsInfo" class="hud">Loading hands...</div>
        
        <button id="startGame" class="control">🚀 START GAME</button>
        <button id="resetGame" class="control hidden">🔄 RESET</button>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        class NeonHandHockey {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.webcam = document.getElementById('webcamCanvas');
                
                this.W = window.innerWidth;
                this.H = window.innerHeight;
                this.canvas.width = this.W;
                this.canvas.height = this.H;
                
                this.gameActive = false;
                this.scoreLeft = 0;
                this.scoreRight = 0;
                
                this.paddleLeft = { x: 120, y: this.H/2, r: 35 };
                this.paddleRight = { x: this.W-120, y: this.H/2, r: 35 };
                this.ball = {
                    x: this.W/2, y: this.H/2,
                    vx: 0, vy: 0,
                    r: 15,
                    trail: [],
                    speed: 9
                };
                
                this.leftFingerPos = null;
                this.rightFingerPos = null;
                this.handsDetected = 0;
                
                window.addEventListener('resize', () => this.resize());
                this.initWebcam();
                this.bindControls();
                this.gameLoop();
            }
            
            resize() {
                this.W = window.innerWidth;
                this.H = window.innerHeight;
                this.canvas.width = this.W;
                this.canvas.height = this.H;
            }
            
            async initWebcam() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1920 }, height: { ideal: 1080 } }
                    });
                    this.webcam.srcObject = stream;
                    
                    this.hands = new Hands({
                        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                    });
                    
                    this.hands.setOptions({
                        maxNumHands: 2,
                        modelComplexity: 1,
                        minDetectionConfidence: 0.8,
                        minTrackingConfidence: 0.8
                    });
                    
                    this.hands.onResults(this.onHandDetection.bind(this));
                    
                    const sendFrame = async () => {
                        if (this.webcam.readyState >= 2) {
                            await this.hands.send({ image: this.webcam });
                        }
                        requestAnimationFrame(sendFrame);
                    };
                    sendFrame();
                } catch (error) {
                    document.getElementById('handsInfo').textContent = '❌ Camera Error';
                }
            }
            
            bindControls() {
                document.getElementById('startGame').onclick = () => this.start();
                document.getElementById('resetGame').onclick = () => this.resetGame();
                document.addEventListener('keydown', (e) => {
                    if (e.key.toLowerCase() === 'r') this.resetGame();
                });
            }
            
            onHandDetection(results) {
                if (!this.gameActive) return;
                this.leftFingerPos = null;
                this.rightFingerPos = null;
                this.handsDetected = 0;
                
                if (results.multiHandLandmarks) {
                    results.multiHandLandmarks.forEach((landmarks) => {
                        const fingerTip = landmarks[8];
                        const x = (1 - fingerTip.x) * this.W;
                        const y = fingerTip.y * this.H;
                        
                        if (x < this.W / 2) {
                            this.leftFingerPos = {
                                x: Math.max(80, Math.min(x, this.W/2 - 60)),
                                y: Math.max(60, Math.min(y, this.H - 60))
                            };
                            this.handsDetected++;
                        } else {
                            this.rightFingerPos = {
                                x: Math.max(this.W/2 + 60, Math.min(x, this.W - 80)),
                                y: Math.max(60, Math.min(y, this.H - 60))
                            };
                            this.handsDetected++;
                        }
                    });
                }
            }
            
            start() {
                this.gameActive = true;
                this.scoreLeft = 0;
                this.scoreRight = 0;
                document.getElementById('startGame').classList.add('hidden');
                document.getElementById('resetGame').classList.remove('hidden');
                this.resetBall();
            }

            resetGame() {
                this.scoreLeft = 0;
                this.scoreRight = 0;
                this.resetBall();
                this.gameActive = true;
            }
            
            resetBall() {
                this.ball.x = this.W / 2;
                this.ball.y = this.H / 2;
                this.ball.vx = (Math.random() > 0.5 ? 1 : -1) * this.ball.speed;
                this.ball.vy = (Math.random() - 0.5) * 10;
                this.ball.trail = [];
            }
            
            update() {
                if (!this.gameActive) return;
                
                const smoothFactor = 0.45;
                if (this.leftFingerPos) {
                    this.paddleLeft.x += (this.leftFingerPos.x - this.paddleLeft.x) * smoothFactor;
                    this.paddleLeft.y += (this.leftFingerPos.y - this.paddleLeft.y) * smoothFactor;
                }
                if (this.rightFingerPos) {
                    this.paddleRight.x += (this.rightFingerPos.x - this.paddleRight.x) * smoothFactor;
                    this.paddleRight.y += (this.rightFingerPos.y - this.paddleRight.y) * smoothFactor;
                }
                
                this.ball.x += this.ball.vx;
                this.ball.y += this.ball.vy;
                this.ball.trail.push({ x: this.ball.x, y: this.ball.y });
                if (this.ball.trail.length > 25) this.ball.trail.shift();
                
                // Pantul Atas/Bawah
                if (this.ball.y <= this.ball.r || this.ball.y >= this.H - this.ball.r) {
                    this.ball.vy *= -1;
                }
                
                // FIX 3 & 4: Logika Gawang vs Pantulan Dinding Samping
                const goalHeight = 180;
                const goalTop = (this.H - goalHeight) / 2;
                const goalBottom = (this.H + goalHeight) / 2;

                // Sisi Kiri
                if (this.ball.x <= this.ball.r) {
                    if (this.ball.y > goalTop && this.ball.y < goalBottom) {
                        this.scoreRight++; // Goal untuk P2
                        this.resetBall();
                    } else {
                        this.ball.vx *= -1; // Mantul
                        this.ball.x = this.ball.r;
                    }
                } 
                // Sisi Kanan
                else if (this.ball.x >= this.W - this.ball.r) {
                    if (this.ball.y > goalTop && this.ball.y < goalBottom) {
                        this.scoreLeft++; // Goal untuk P1
                        this.resetBall();
                    } else {
                        this.ball.vx *= -1; // Mantul
                        this.ball.x = this.W - this.ball.r;
                    }
                }
                
                // Tabrakan Paddle
                [this.paddleLeft, this.paddleRight].forEach(paddle => {
                    const dx = this.ball.x - paddle.x;
                    const dy = this.ball.y - paddle.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < this.ball.r + paddle.r) {
                        const angle = Math.atan2(dy, dx);
                        const speed = Math.sqrt(this.ball.vx**2 + this.ball.vy**2);
                        this.ball.vx = Math.cos(angle) * (speed + 1);
                        this.ball.vy = Math.sin(angle) * (speed + 1);
                    }
                });
                
                document.getElementById('scoreLeft').textContent = `P1: ${this.scoreLeft}`;
                document.getElementById('scoreRight').textContent = `P2: ${this.scoreRight}`;
                document.getElementById('handsInfo').textContent = `Hands: ${this.handsDetected} | First to 7!`;
                
                if (this.scoreLeft >= 7 || this.scoreRight >= 7) {
                    this.gameActive = false;
                    document.getElementById('handsInfo').textContent = 
                        `${this.scoreLeft >= 7 ? '🟢 LEFT' : '🔴 RIGHT'} WINS! Press R`;
                }
            }
            
            render() {
                this.ctx.clearRect(0, 0, this.W, this.H);
                
                // Garis Tengah
                this.ctx.strokeStyle = '#00ff88';
                this.ctx.lineWidth = 6;
                this.ctx.setLineDash([50, 50]);
                this.ctx.beginPath();
                this.ctx.moveTo(this.W/2, 0);
                this.ctx.lineTo(this.W/2, this.H);
                this.ctx.stroke();
                this.ctx.setLineDash([]);
                
                // Gawang
                const goalHeight = 180;
                const goalWidth = 120;
                this.ctx.lineWidth = 12;
                this.ctx.shadowBlur = 35;
                
                this.ctx.strokeStyle = '#00ff88';
                this.ctx.shadowColor = '#00ff88';
                this.ctx.strokeRect(0, (this.H - goalHeight)/2, goalWidth, goalHeight);
                
                this.ctx.strokeStyle = '#ff00ff';
                this.ctx.shadowColor = '#ff00ff';
                this.ctx.strokeRect(this.W - goalWidth, (this.H - goalHeight)/2, goalWidth, goalHeight);
                
                // Sniper Scope
                const drawScope = (x, y, color) => {
                    this.ctx.shadowBlur = 20;
                    this.ctx.strokeStyle = color;
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 30, 0, Math.PI*2);
                    this.ctx.stroke();
                    this.ctx.beginPath();
                    this.ctx.moveTo(x - 35, y); this.ctx.lineTo(x + 35, y);
                    this.ctx.moveTo(x, y - 35); this.ctx.lineTo(x, y + 35);
                    this.ctx.stroke();
                };

                if (this.leftFingerPos) drawScope(this.leftFingerPos.x, this.leftFingerPos.y, '#00ff88');
                if (this.rightFingerPos) drawScope(this.rightFingerPos.x, this.rightFingerPos.y, '#ff00ff');
                
                // Ball
                this.ball.trail.forEach((pos, i) => {
                    this.ctx.fillStyle = `rgba(255,255,255,${i/25})`;
                    this.ctx.beginPath();
                    this.ctx.arc(pos.x, pos.y, this.ball.r, 0, Math.PI*2);
                    this.ctx.fill();
                });
                
                this.ctx.shadowColor = '#ffffff';
                this.ctx.shadowBlur = 50;
                this.ctx.fillStyle = '#ffffff';
                this.ctx.beginPath();
                this.ctx.arc(this.ball.x, this.ball.y, this.ball.r, 0, Math.PI*2);
                this.ctx.fill();
                this.ctx.shadowBlur = 0;
            }
            
            gameLoop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        new NeonHandHockey();
    </script>
</body>
</html>
